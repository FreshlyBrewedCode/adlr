name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      ) &&
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Ensure GitHub CLI is available
        run: gh --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure opencode
        uses: ./.github/actions/configure-opencode
        with:
          config: |
            {
              "$schema": "https://opencode.ai/config.json",
              "permission": {
                "external_directory": {
                  "*": "deny",
                  "/tmp/**": "allow"
                }
              },
              "instructions": [".github/workflows/opencode-instructions.md"]
            }

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Build prompt
        id: prompt
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const markerRegex = /(?:^|\s)(\/oc|\/opencode)(?=\s|$)/gi;
            const userPrompt = body.replace(markerRegex, ' ').replace(/\s+/g, ' ').trim();

            const isPR = !!context.payload.issue?.pull_request || context.eventName === 'pull_request_review_comment';
            const number = context.payload.issue?.number ?? context.payload.pull_request?.number;

            const instructions = isPR
              ? `You are responding to a comment on pull request #${number}. Focus on the PR context and provide actionable feedback.`
              : `You are responding to a comment on issue #${number}. Investigate thoroughly and suggest a clear implementation plan.`;

            const fullPrompt = `${instructions}\n\n${userPrompt}`;
            core.setOutput('prompt', fullPrompt);

      - name: Run opencode
        id: opencode
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          opencode run \
            --model opencode-go/kimi-k2.7-code \
            --prompt ${{ toJSON(steps.prompt.outputs.prompt) }} > "$RUNNER_TEMP/opencode-response.md"

      - name: Post response
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          is_pr=${{ (github.event.issue.pull_request || github.event.pull_request) && 'true' || 'false' }}
          number=${{ github.event.issue.number || github.event.pull_request.number }}

          if [ "$is_pr" = "true" ]; then
            gh pr comment "$number" --body-file "$RUNNER_TEMP/opencode-response.md"
          else
            gh issue comment "$number" --body-file "$RUNNER_TEMP/opencode-response.md"
          fi
